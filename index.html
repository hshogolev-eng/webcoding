<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,interactive-widget=resizes-content">
<title>Claude Code — Курс</title>

<script type="importmap">{"imports":{"preact":"https://esm.sh/preact@10.22.0","preact/hooks":"https://esm.sh/preact@10.22.0/hooks","htm/preact":"https://esm.sh/htm@3.1.1/preact"}}</script>
<style>
/* ── CSS Variables — auto dark mode ── */
:root{
  --bg:#f2f2f7;--surface:#fff;--surface2:#f2f2f7;--surface3:rgba(0,0,0,.06);
  --text1:#1c1c1e;--text2:#636366;--text3:#8e8e93;
  --border:rgba(0,0,0,.1);--border2:rgba(0,0,0,.07);
  --hdr:rgba(255,255,255,.9);--btm:rgba(242,242,247,.96);
  --bubble:#fff;--input:#fff;--code:#1c1c2e;--shadow:rgba(0,0,0,.08);
  --sidebar:#f2f2f7;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#000;--surface:#1c1c1e;--surface2:#2c2c2e;--surface3:rgba(255,255,255,.08);
  --text1:#fff;--text2:rgba(235,235,245,.75);--text3:rgba(235,235,245,.5);
  --border:rgba(255,255,255,.15);--border2:rgba(255,255,255,.06);
  --hdr:rgba(28,28,30,.92);--btm:rgba(0,0,0,.96);
  --bubble:#2c2c2e;--input:#3a3a3c;--code:#0d0d14;--shadow:rgba(0,0,0,.3);
  --sidebar:#1c1c1e;
}}
*{box-sizing:border-box;margin:0;padding:0;-webkit-font-smoothing:antialiased}
body{font-family:-apple-system,'SF Pro Display',BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--text1);min-height:100dvh;display:flex;flex-direction:column}
#root{flex:1;display:flex;flex-direction:column;max-width:430px;margin:0 auto;width:100%;min-height:100dvh;position:relative}

/* Header */
.hdr{background:var(--hdr);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);padding:10px 12px;padding-top:calc(10px + env(safe-area-inset-top));display:flex;align-items:center;gap:8px;position:sticky;top:0;z-index:10;border-bottom:.5px solid var(--border)}
.hbtn{width:40px;height:40px;border-radius:11px;background:var(--surface3);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--text1);font-size:16px;transition:background .15s}
.hbtn:hover{background:var(--border)}
.htxt{flex:1;min-width:0}
.ht{font-size:14px;font-weight:600;color:var(--text1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hs{font-size:11px;margin-top:1px;color:var(--text2)}
.pill{border-radius:20px;padding:3px 9px;font-size:11px;font-weight:700;flex-shrink:0}
.pbar{height:3px;background:var(--surface3);flex-shrink:0}
.pfill{height:100%;border-radius:0 2px 2px 0;transition:width .5s cubic-bezier(.4,0,.2,1)}

/* Messages */
.msgs-wrap{flex:1;position:relative;overflow:hidden}
.msgs{height:100%;overflow-y:auto;padding:14px 12px;display:flex;flex-direction:column;gap:10px;padding-bottom:112px}
.es{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;padding:40px 20px;text-align:center;min-height:300px}
.eico{width:72px;height:72px;border-radius:22px;display:flex;align-items:center;justify-content:center;font-size:28px}
.et{font-size:19px;font-weight:700;color:var(--text1);letter-spacing:-.3px}
.es2{font-size:14px;color:var(--text2);line-height:1.55}
.row{display:flex;gap:8px;align-items:flex-start}
.row.u{flex-direction:row-reverse}
.ava{width:28px;height:28px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:800;color:#fff;margin-top:2px}
.bub-wrap{display:flex;flex-direction:column;gap:6px;max-width:88%;min-width:0}
.bub{padding:10px 14px;border-radius:18px;font-size:14px;line-height:1.65;word-break:break-word}
.bub.t{background:var(--bubble);color:var(--text1);border-top-left-radius:4px;box-shadow:0 1px 4px var(--shadow)}
.bub.u{color:#fff;border-top-right-radius:4px;border-bottom-right-radius:4px}
.bub p{margin-bottom:.45em}.bub p:last-child{margin-bottom:0}
.bub strong{font-weight:600}.bub em{font-style:italic}
.bub h3{font-size:14px;font-weight:700;margin:8px 0 4px;color:var(--text1)}
.bub ul,.bub ol{padding-left:18px;margin:.3em 0}.bub li{margin:.15em 0}

/* Rich blocks */
.code-block{background:var(--code);border-radius:14px;overflow:hidden}
.code-hdr{display:flex;align-items:center;justify-content:space-between;padding:8px 14px;background:rgba(255,255,255,.07)}
.code-lang{font-size:11px;font-weight:700;color:#8e8e93;text-transform:uppercase;letter-spacing:.05em}
.copy-btn{background:rgba(255,255,255,.1);border:none;border-radius:6px;color:#aeaeb2;font-size:11px;font-weight:600;padding:3px 10px;cursor:pointer;font-family:inherit;transition:background .15s}
.copy-btn:hover{background:rgba(255,255,255,.18)}.copy-btn.copied{color:#34C759}
.code-body{padding:12px 14px;overflow-x:auto}
.code-body pre{font-family:'SF Mono',Menlo,Monaco,monospace;font-size:12.5px;line-height:1.6;color:#e8e8f0;margin:0;white-space:pre-wrap;word-break:break-all}

/* Checklist */
.chk-block{background:var(--surface);border-radius:14px;padding:14px 16px;box-shadow:0 1px 4px var(--shadow)}
.chk-title{font-size:13px;font-weight:700;color:var(--text1);margin-bottom:10px;display:flex;align-items:center;gap:6px}
.chk-item{display:flex;align-items:flex-start;gap:10px;padding:6px 0;border-bottom:.5px solid var(--border2);cursor:pointer;transition:opacity .15s}
.chk-item:last-child{border-bottom:none}.chk-item.done{opacity:.5}
.chk-box{width:20px;height:20px;border-radius:50%;border:2px solid var(--text3);flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;transition:all .2s;background:var(--surface)}
.chk-item.done .chk-box{background:#34C759;border-color:#34C759}
.chk-txt{font-size:13px;line-height:1.45;color:var(--text1);flex:1}
.chk-item.done .chk-txt{text-decoration:line-through;color:var(--text3)}
.chk-prog{margin-top:8px;height:3px;background:var(--surface3);border-radius:2px;overflow:hidden}
.chk-fill{height:100%;background:linear-gradient(90deg,#34C759,#30D158);border-radius:2px;transition:width .3s}

/* Phase indicator */
.phase-block{background:var(--surface);border-radius:14px;padding:14px 16px;box-shadow:0 1px 4px var(--shadow)}
.phase-title{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px}
.phase-steps{display:flex;gap:0px;align-items:center}
.phase-step{display:flex;flex-direction:column;align-items:center;gap:4px;flex-shrink:0}
.phase-dot{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700}
.phase-dot.done{background:#34C759;color:#fff}
.phase-dot.active{color:#fff}
.phase-dot.pending{background:var(--surface3);color:var(--text3)}
.phase-lbl{font-size:9px;font-weight:600;color:var(--text3);text-transform:uppercase;text-align:center;letter-spacing:.04em}
.phase-lbl.active{color:var(--text1);font-weight:700}
.phase-conn{flex:1;height:2px;background:var(--surface3);margin-bottom:14px;border-radius:1px;min-width:8px}
.phase-conn.done{background:#34C759}

/* Schema */
.schema-block{background:var(--surface);border-radius:14px;padding:14px 16px;box-shadow:0 1px 4px var(--shadow)}
.schema-title{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.04em;margin-bottom:10px}

/* Dashboard preview */
.dash-preview{background:var(--surface);border-radius:14px;padding:14px;box-shadow:0 1px 4px var(--shadow)}
.dash-title{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.04em;margin-bottom:12px}
.kpi-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.kpi-card{border-radius:10px;padding:10px 12px}
.kpi-label{font-size:10px;font-weight:600;color:var(--text3);margin-bottom:3px}
.kpi-value{font-size:20px;font-weight:700;line-height:1}
.kpi-trend{font-size:10px;font-weight:600;margin-top:3px}
.mini-chart{height:48px;display:flex;align-items:flex-end;gap:3px;padding:0 2px}
.bar{border-radius:3px 3px 0 0;flex:1;min-width:8px}

/* Callouts */
.callout{border-radius:12px;padding:12px 14px;font-size:13px;line-height:1.55;display:flex;gap:10px}
.callout-icon{font-size:16px;flex-shrink:0;line-height:1.4}
.callout-text{flex:1;color:var(--text1)}
.callout.note{background:rgba(52,199,89,.12);border-left:3px solid #34C759}
.callout.tip{background:rgba(0,122,255,.12);border-left:3px solid #007AFF}
.callout.warning{background:rgba(255,149,0,.12);border-left:3px solid #FF9500}
.callout.stop{background:rgba(255,59,48,.12);border-left:3px solid #FF3B30}

/* Table */
.md-table{width:100%;border-collapse:collapse;font-size:12px;background:var(--surface);border-radius:12px;overflow:hidden;box-shadow:0 1px 4px var(--shadow)}
.md-table th{background:var(--surface2);font-weight:600;color:var(--text1);padding:8px 12px;text-align:left;border-bottom:1px solid var(--border)}
.md-table td{padding:8px 12px;color:var(--text1);border-bottom:.5px solid var(--border2)}
.md-table tr:last-child td{border-bottom:none}

/* Progress file */
.prog-block{background:var(--surface);border-radius:14px;overflow:hidden;box-shadow:0 1px 4px var(--shadow)}
.prog-hdr{padding:10px 14px;display:flex;align-items:center;justify-content:space-between}
.prog-row{display:flex;gap:8px;margin-bottom:4px;font-size:12px;color:var(--text1)}
.prog-key{font-weight:600;color:var(--text3);min-width:110px;flex-shrink:0}

/* Glossary */
.gloss-term{border-bottom:1.5px dotted var(--text3);cursor:pointer;position:relative;display:inline}
.gloss-tip{position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);background:var(--text1);color:var(--surface);font-size:12px;line-height:1.4;padding:8px 12px;border-radius:10px;white-space:normal;width:200px;z-index:100;box-shadow:0 4px 16px var(--shadow);pointer-events:none}
.gloss-tip::after{content:'';position:absolute;top:100%;left:50%;transform:translateX(-50%);border:5px solid transparent;border-top-color:var(--text1)}

/* Rating */
.rating-block{display:flex;gap:6px;align-items:center;padding:10px 14px;background:var(--surface);border-radius:14px;box-shadow:0 1px 4px var(--shadow)}
.rating-label{font-size:12px;color:var(--text2);flex-shrink:0}
.rating-btn{flex:1;padding:8px 4px;border-radius:10px;border:.5px solid var(--border);background:var(--surface2);cursor:pointer;font-family:inherit;font-size:12px;font-weight:600;color:var(--text2);transition:all .15s;text-align:center}
.rating-btn:hover{transform:scale(1.03)}.rating-btn.sel{border-color:transparent;color:#fff}

/* Typing dots */
.dots{display:flex;gap:4px;align-items:center}
.dot{width:7px;height:7px;border-radius:50%;background:var(--text3);animation:pu 1.4s infinite}

/* Scroll btn */
.scroll-btn{position:absolute;bottom:116px;right:14px;width:36px;height:36px;border-radius:50%;background:var(--surface);border:.5px solid var(--border);cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px var(--shadow);transition:opacity .2s,transform .2s;z-index:5;color:var(--text1)}
.scroll-btn.hidden{opacity:0;pointer-events:none;transform:scale(.8)}

/* Bottom bar */
.btm{background:var(--btm);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);padding:8px 12px;padding-bottom:calc(12px + env(safe-area-inset-bottom));border-top:.5px solid var(--border);flex-shrink:0}
.sbtn{width:100%;padding:15px;border-radius:16px;color:#fff;font-size:16px;font-weight:700;border:none;cursor:pointer;font-family:inherit;letter-spacing:-.2px;transition:opacity .15s,transform .12s}
.sbtn:active{opacity:.88;transform:scale(.97)}
.irow{display:flex;gap:6px;align-items:flex-end}
.ta{flex:1;background:var(--input);border:none;border-radius:22px;padding:10px 14px;font-size:15px;font-family:inherit;color:var(--text1);outline:none;box-shadow:0 2px 8px var(--shadow);resize:none;min-height:44px;max-height:96px;line-height:1.45}
.ta::placeholder{color:var(--text3)}
.hint{font-size:11px;color:var(--text3);text-align:center;margin-top:4px}
.sndbtn{width:44px;height:44px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:transform .12s}
.sndbtn:active{transform:scale(.88)}
.micbtn{width:36px;height:36px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;background:var(--surface3);color:var(--text2);transition:all .15s}
.micbtn.listening{background:rgba(255,59,48,.15);color:#FF3B30;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}

/* Reminder banner */
.reminder{background:linear-gradient(135deg,#FF9500,#FF6B35);border-radius:14px;padding:12px 14px;display:flex;align-items:center;gap:10px;color:#fff;margin:0 0 10px}
.reminder-txt{flex:1;font-size:13px;font-weight:600}
.reminder-x{background:rgba(255,255,255,.2);border:none;border-radius:6px;color:#fff;padding:3px 8px;cursor:pointer;font-family:inherit;font-size:12px}

/* Notes panel */
.notes-ov{position:fixed;inset:0;z-index:60;display:flex;flex-direction:column;justify-content:flex-end}
.notes-dim{position:absolute;inset:0;background:rgba(0,0,0,.4)}
.notes-panel{position:relative;background:var(--surface);border-radius:20px 20px 0 0;padding:16px;padding-bottom:calc(20px + env(safe-area-inset-bottom));z-index:1;animation:slideUp .25s cubic-bezier(.4,0,.2,1)}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.notes-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.notes-title{font-size:16px;font-weight:700;color:var(--text1)}
.notes-area{width:100%;min-height:140px;max-height:240px;background:var(--surface2);border:none;border-radius:12px;padding:12px;font-size:14px;font-family:inherit;color:var(--text1);line-height:1.55;resize:none;outline:none}
.notes-area::placeholder{color:var(--text3)}
.notes-hint{font-size:11px;color:var(--text3);margin-top:6px;text-align:center}

/* Sidebar */
.ov{position:fixed;inset:0;z-index:50;display:flex}
.sht{width:300px;background:var(--sidebar);height:100%;overflow-y:auto;animation:si .27s cubic-bezier(.4,0,.2,1)}
.shhdr{padding:20px 16px 12px;display:flex;align-items:center;justify-content:space-between}
.sht2{font-size:20px;font-weight:700;color:var(--text1);letter-spacing:-.4px}
.xbtn{width:44px;height:44px;border-radius:50%;background:var(--surface3);border:none;cursor:pointer;font-size:15px;color:var(--text2);display:flex;align-items:center;justify-content:center}
.course-tabs{display:flex;gap:6px;margin:0 16px 14px;background:var(--surface3);border-radius:12px;padding:3px}
.ctab{flex:1;padding:7px;border-radius:9px;border:none;cursor:pointer;font-family:inherit;font-size:12px;font-weight:600;color:var(--text2);background:none;transition:all .2s}
.ctab.active{background:var(--surface);color:var(--text1);box-shadow:0 1px 4px var(--shadow)}
.s-card{background:var(--surface);border-radius:14px;margin:0 16px 2px;overflow:hidden;box-shadow:0 1px 3px var(--shadow)}
.li{display:flex;align-items:center;gap:10px;padding:11px 14px;cursor:pointer;border:none;background:none;width:100%;text-align:left;font-family:inherit;min-height:44px;transition:background .1s;color:var(--text1)}
.li:active,.li.act{background:var(--surface3)}
.lbox{width:30px;height:30px;border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.lname{font-size:13px;line-height:1.3;color:var(--text1)}
.li.act .lname{font-weight:600}
.sdiv{height:.5px;background:var(--border2);margin:0 14px}
.dim{flex:1;background:rgba(0,0,0,.45)}

/* Error */
.err-blk{background:rgba(255,59,48,.1);border:.5px solid rgba(255,59,48,.3);border-radius:12px;padding:10px 13px;font-size:12px;color:#FF3B30;line-height:1.5}
.rbtn{font-size:11px;color:var(--text3);background:none;border:none;cursor:pointer;font-family:inherit;text-decoration:underline;margin-top:5px;display:block}

/* Confirm strip */
.confirm-strip{background:rgba(255,149,0,.15);border:.5px solid rgba(255,149,0,.3);border-radius:12px;padding:10px 13px;font-size:13px;color:var(--text1);display:flex;align-items:center;justify-content:space-between;gap:8px;margin:0 16px 8px}
.cyes{padding:6px 14px;border-radius:8px;background:#FF3B30;color:#fff;font-size:12px;font-weight:600;border:none;cursor:pointer;font-family:inherit}
.cno{padding:6px 14px;border-radius:8px;background:var(--surface3);color:var(--text1);font-size:12px;font-weight:600;border:none;cursor:pointer;font-family:inherit}
.reset-lnk{font-size:12px;color:var(--text3);background:none;border:none;cursor:pointer;font-family:inherit;text-decoration:underline;padding:8px 16px 12px;display:block}

/* API screen */
.apiscreen{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;padding:24px;text-align:center;gap:16px;min-height:100dvh}
.apicard{background:var(--surface);border-radius:20px;padding:28px 24px;width:100%;max-width:360px;box-shadow:0 2px 16px var(--shadow)}
.apititle{font-size:22px;font-weight:700;color:var(--text1);letter-spacing:-.4px;margin-bottom:6px}
.apisub{font-size:14px;color:var(--text2);line-height:1.5;margin-bottom:20px}
.api-lbl{display:block;font-size:12px;font-weight:600;color:var(--text2);text-align:left;margin-bottom:6px}
.apiinput{width:100%;padding:13px 16px;border-radius:12px;border:1.5px solid var(--border);font-size:14px;font-family:inherit;color:var(--text1);background:var(--input);outline:none;margin-bottom:12px;transition:border-color .2s}
.apiinput:focus{border-color:#007AFF}
.apibtn{width:100%;padding:14px;border-radius:13px;background:linear-gradient(135deg,#007AFF,#0A84FF);color:#fff;font-size:16px;font-weight:700;border:none;cursor:pointer;font-family:inherit;box-shadow:0 4px 14px rgba(0,122,255,.35);transition:opacity .15s}
.apibtn:disabled{opacity:.55;cursor:not-allowed}
.apihint{font-size:12px;color:var(--text2);margin-top:10px;line-height:1.5}
.apihint a{color:#007AFF;text-decoration:none}

/* Print styles */
@media print{
  .hdr,.btm,.msgs-wrap .scroll-btn,.ov,.notes-ov,.rating-block{display:none!important}
  body{background:#fff;color:#000}
  .msgs{padding:0;height:auto;overflow:visible;padding-bottom:0}
  .msgs-wrap{overflow:visible;height:auto}
  #root{max-width:100%;min-height:auto}
  .row{break-inside:avoid;margin-bottom:12px}
  .bub.t{box-shadow:none;border:1px solid #ddd}
  .code-block{break-inside:avoid}
  .chk-block,.schema-block,.dash-preview,.phase-block{break-inside:avoid;border:1px solid #ddd;box-shadow:none}
  @page{margin:2cm}
}

.skip-nav{position:absolute;left:-9999px;width:1px;height:1px;overflow:hidden}
button:focus-visible{outline:2px solid #007AFF;outline-offset:2px;border-radius:4px}
@keyframes pu{0%,60%,100%{opacity:.3;transform:scale(.85)}30%{opacity:1;transform:scale(1.1)}}
@keyframes si{from{transform:translateX(-100%)}to{transform:translateX(0)}}
</style>
</head>

<div id="root"></div>

import { h, Fragment, render } from 'preact';
import { useState, useRef, useEffect, useCallback } from 'preact/hooks';
import { html } from 'htm/preact';

/* ── Service Worker ── */


/* ── PWA Manifest ── */
(()=>{
  const m={name:"Claude Code — Курс",short_name:"CC Курс",display:"standalone",background_color:"#f2f2f7",theme_color:"#34C759",start_url:".",icons:[{src:"data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect width='192' height='192' rx='48' fill='%2334C759'/><text x='96' y='134' font-size='110' text-anchor='middle' fill='white'>◈</text></svg>",sizes:"192x192",type:"image/svg+xml"}]};
  const link=Object.assign(document.createElement('link'),{rel:'manifest',href:URL.createObjectURL(new Blob([JSON.stringify(m)],{type:'application/manifest+json'}))});
  document.head.appendChild(link);

function ls(k,d){try{const v=localStorage.getItem(k);return v!=null?JSON.parse(v):d;}catch{return d;}}
function lsSet(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch{}}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,5);}
function lsKey(course,suffix){return `tutor_${course}_${suffix}`;}

/* ── useFocusTrap ── */
function useFocusTrap(active,onEsc){
  const ref=useRef(null);
  useEffect(()=>{
    if(!active||!ref.current)return;
    const el=ref.current;
    const nodes=el.querySelectorAll('button,[href],input,textarea,[tabindex]:not([tabindex="-1"])');
    const first=nodes[0],last=nodes[nodes.length-1];
    const prev=document.activeElement;
    setTimeout(()=>first?.focus(),10);
    const h=(e)=>{
      if(e.key==='Escape'){onEsc();return;}
      if(e.key!=='Tab')return;
      if(e.shiftKey){if(document.activeElement===first){e.preventDefault();last?.focus();}}
      else{if(document.activeElement===last){e.preventDefault();first?.focus();}}
    };
    document.addEventListener('keydown',h);
    return()=>{document.removeEventListener('keydown',h);prev?.focus();};
  },[active]);
  return ref;
}

function CopyBtn({text}){
  const [c,setC]=useState(false);
  const copy=()=>{navigator.clipboard?.writeText(text).then(()=>{setC(true);setTimeout(()=>setC(false),2000);}).catch(()=>{});};
  return html`<button class=${`copy-btn ${c?'copied':''}`} onClick=${copy}>${c?'✓ Скопировано':'Скопировать'}</button>`;
}

function ChecklistBlock({title,items,msgId,idx,course}){
  const key=`chk_${course}_${msgId}_${idx}`;
  const [checks,setChecks]=useState(()=>ls(key,{}));
  const toggle=(i)=>{const n={...checks,[i]:!checks[i]};setChecks(n);lsSet(key,n);};
  const done=Object.values(checks).filter(Boolean).length;
  return html`
    <div class="chk-block">
      ${title&&html`<div class="chk-title">☑ ${title}</div>`}
      ${items.map((item,i)=>html`
        <div key=${i} class=${`chk-item ${checks[i]?'done':''}`} onClick=${()=>toggle(i)}>
          <div class="chk-box">${checks[i]&&html`<svg width="10" height="8" viewBox="0 0 10 8" fill="none"><path d="M1 4L3.5 6.5L9 1" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>`}</div>
          <span class="chk-txt">${item}</span>
        </div>`)}
      <div class="chk-prog"><div class="chk-fill" style="width:${items.length?Math.round(done/items.length*100):0}%"/></div>
    </div>`;
}

/* ── Glossary tooltip ── */
function GlossaryText({text}){
  const [active,setActive]=useState(null);
  const words=Object.keys(GLOSSARY);
  const parts=[];
  let rest=text,last=0;
  const termRe=new RegExp(`\\b(${words.map(w=>w.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')).join('|')})\\b`,'gi');
  let m;
  while((m=termRe.exec(text))!==null){
    if(m.index>last)parts.push(text.slice(last,m.index));
    const term=m[0];
    const def=GLOSSARY[term.toLowerCase()];
    parts.push(html`<span key=${m.index} class="gloss-term" onClick=${(e)=>{e.stopPropagation();setActive(active===m.index?null:m.index);}}>
      ${term}
      ${active===m.index&&html`<span class="gloss-tip">${def}</span>`}
    </span>`);
    last=m.index+m[0].length;
  }
  if(last<text.length)parts.push(text.slice(last));
  return h(Fragment,null,...parts);
}

/* ── Inline markdown ── */
function renderInline(text,applyGloss=false){
  const segs=[];let i=0,buf='';
  while(i<text.length){
    if(text[i]==='*'&&text[i+1]==='*'){const end=text.indexOf('**',i+2);if(end>-1){if(buf){segs.push(buf);buf='';}segs.push(h('strong',null,renderInline(text.slice(i+2,end))));i=end+2;continue;}}
    if(text[i]==='*'&&text[i+1]!=='*'){const end=text.indexOf('*',i+1);if(end>-1){if(buf){segs.push(buf);buf='';}segs.push(h('em',null,text.slice(i+1,end)));i=end+1;continue;}}
    if(text[i]==='`'&&text[i+1]!=='`'){const end=text.indexOf('`',i+1);if(end>-1){if(buf){segs.push(buf);buf='';}segs.push(h('code',{style:{background:'var(--surface3)',borderRadius:'4px',padding:'1px 5px',fontSize:'12px',fontFamily:"'SF Mono',Menlo,monospace"}},text.slice(i+1,end)));i=end+1;continue;}}
    buf+=text[i++];
  }
  if(buf){segs.push(applyGloss?h(GlossaryText,{text:buf}):buf);}
  return segs;
}

function renderParagraph(para){
  if(!para.trim())return null;
  if(/^#{1,3}\s/.test(para)){const lv=para.match(/^(#+)/)[1].length;return h(`h${Math.min(lv,3)}`,{style:{fontSize:lv===1?'15px':lv===2?'14px':'13px',fontWeight:700,margin:'8px 0 4px',color:'var(--text1)'}},renderInline(para.replace(/^#+\s/,'')));}
  if(/^[-*]\s/.test(para)){return h('ul',null,para.split('\n').filter(l=>/^[-*]\s/.test(l)).map((l,i)=>h('li',{key:i},renderInline(l.replace(/^[-*]\s/,''),true))));}
  if(/^\d+\.\s/.test(para)){return h('ol',null,para.split('\n').filter(l=>/^\d+\.\s/.test(l)).map((l,i)=>h('li',{key:i},renderInline(l.replace(/^\d+\.\s/,''),true))));}
  return h('p',null,renderInline(para,true));
}

function renderTable(block){
  const rows=block.split('\n').filter(l=>l.trim().startsWith('|'));
  if(rows.length<2)return null;
  const hdrs=rows[0].split('|').filter(c=>c.trim()).map(c=>c.trim());
  const body=rows.slice(2).map(r=>r.split('|').filter(c=>c.trim()).map(c=>c.trim()));
  return h('div',{style:{overflowX:'auto'}},h('table',{class:'md-table'},h('thead',null,h('tr',null,hdrs.map((c,i)=>h('th',{key:i},c)))),h('tbody',null,body.map((row,i)=>h('tr',{key:i},row.map((cell,j)=>h('td',{key:j},renderInline(cell))))))));
}

/* ── Main rich message renderer ── */
function RichMessage({text,msgId,isUser,course,onFinalDetected}){
  if(isUser){return html`<div class="bub u" style="width:fit-content">${text.split('\n').map((l,i,a)=>html`<span key=${i}>${l}${i<a.length-1?html`<br/>`:''}</span>`)}</div>`;}
  useEffect(()=>{if(text.includes('progress')&&text.includes('ЗАНЯТИЕ'))onFinalDetected?.();},[]);
  const segments=[];let last=0;let bi=0;
  const re=/(```([\w]*)\n([\s\S]*?)```|:::([\w]+)[ \t]*([^\n]*)\n([\s\S]*?):::(?:\n|$)|:::([\w]+)[ \t]*([^\n]*)(?:\n|$))/g;
  let m;
  while((m=re.exec(text))!==null){
    if(m.index>last)segments.push({type:'text',content:text.slice(last,m.index)});
    if(m[1]?.startsWith('```'))segments.push({type:'code',lang:(m[2]||'').trim(),content:(m[3]||'').trim()});
    else if(m[4])segments.push({type:m[4],title:(m[5]||'').trim(),content:(m[6]||'').trim()});
    else if(m[7])segments.push({type:m[7],title:'',content:(m[8]||'').trim()});
    last=m.index+m[0].length;
  }
  if(last<text.length)segments.push({type:'text',content:text.slice(last)});

  const els=[];let tbuf='';
  const flush=()=>{
    if(!tbuf.trim())return;
    const paras=tbuf.split(/\n{2,}/);
    const nodes=paras.map((p,i)=>{
      p=p.trim();if(!p)return null;
      if(p.includes('|')&&p.split('\n').some(l=>l.trim().startsWith('|')))return h(Fragment,{key:i},renderTable(p));
      return h(Fragment,{key:i},renderParagraph(p));
    }).filter(Boolean);
    if(nodes.length)els.push(h('div',{key:'t'+(bi++),class:'bub t'},nodes));
    tbuf='';
  };

  for(const seg of segments){
    if(seg.type==='text'){tbuf+=seg.content;continue;}
    flush();
    const k='b'+(bi++);
    if(seg.type==='code'){
      const isP=seg.lang==='prompt',isB=seg.lang==='bash'||seg.lang==='sh',isProg=seg.lang==='progress';
      if(isProg)els.push(h(ProgressBlock,{key:k,content:seg.content}));
      else els.push(h('div',{key:k,class:'code-block'},h('div',{class:'code-hdr'},h('span',{class:'code-lang'},isP?'Claude Code':isB?'Терминал':seg.lang||'Код'),h(CopyBtn,{text:seg.content})),h('div',{class:'code-body'},h('pre',null,seg.content))));
    }else if(seg.type==='checklist'){
      const items=seg.content.split('\n').filter(l=>/^-\s*\[[ x]\]/.test(l)).map(l=>l.replace(/^-\s*\[[ x]\]\s*/,''));
      els.push(h(ChecklistBlock,{key:k,title:seg.title,items,msgId,idx:bi,course}));
    }else if(seg.type==='phase'){
      els.push(h(PhaseBlock,{key:k,current:seg.title||seg.content}));
    }else if(seg.type==='schema'){
      els.push(h(SchemaBlock,{key:k,title:seg.title,content:seg.content}));
    }else if(seg.type==='dashboard'){
      els.push(h(DashboardBlock,{key:k,raw:seg.content}));
    }else if(['note','tip','warning','stop'].includes(seg.type)){
      const icons={note:'💡',tip:'🎯',warning:'⚠️',stop:'🚫'};
      els.push(h('div',{key:k,class:`callout ${seg.type}`},h('span',{class:'callout-icon'},icons[seg.type]),h('div',{class:'callout-text'},renderInline(seg.content||seg.title,true))));
    }else{tbuf+=(seg.content||seg.title)+'\n';}
  }
  flush();
  return h(Fragment,null,...els);
}

/* ── Lesson rating ── */
const RATINGS=[{id:'good',label:'👍 Понятно',color:'#34C759'},{id:'repeat',label:'🔄 Повторить',color:'#FF9500'},{id:'hard',label:'👎 Сложно',color:'#FF3B30'}];
function LessonRating({lessonKey,onRate}){
  const [sel,setSel]=useState(()=>ls(`rating_${lessonKey}`,null));
  const rate=(id)=>{setSel(id);lsSet(`rating_${lessonKey}`,id);onRate?.(id);};
  return html`
    <div class="rating-block">
      <span class="rating-label">Занятие:</span>
      ${RATINGS.map(r=>html`
        <button key=${r.id} class=${`rating-btn ${sel===r.id?'sel':''}`}
          style=${sel===r.id?{background:r.color}:{}}
          onClick=${()=>rate(r.id)}>
          ${r.label}
        </button>`)}
    </div>`;
}

/* ── API Key Screen ── */
function APIKeyScreen({onSave}){
  const [k,setK]=useState('');
  const [e,setE]=useState('');
  const [loading,setLoading]=useState(false);
  const ref=useRef(null);
  useEffect(()=>ref.current?.focus(),[]);
  const test=async()=>{
    const key=k.trim();
    if(!key||!key.startsWith('sk-')){setE('Ключ должен начинаться с sk-');return;}
    setLoading(true);setE('');
    try{
      const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:MODEL,max_tokens:10,messages:[{role:'user',content:'hi'}]})});
      if(r.ok){lsSet(LS_KEY,key);onSave(key);}
      else{const d=await r.json().catch(()=>{});setE(d?.error?.message||'Неверный ключ.');}
    }catch{setE('Ошибка соединения. Проверь интернет.');}
    setLoading(false);
  };
  return html`
    <div class="apiscreen">
      <div class="apicard">
        <div class="apititle">Claude Code</div>
        <div style="font-size:32px;margin:8px 0">◈</div>
        <div class="apisub">Для работы нужен API-ключ Anthropic. Хранится только в браузере.</div>
        <label class="api-lbl" for="ak">API-ключ</label>
        <input id="ak" ref=${ref} class="apiinput" type="password" placeholder="sk-ant-api03-..."
          value=${k} autocomplete="off" onInput=${e=>setK(e.target.value)} onKeyDown=${e=>{if(e.key==='Enter')test();}}/>
        ${e&&html`<div class="err-blk" role="alert" style="margin-bottom:10px">${e}</div>`}
        <button class="apibtn" onClick=${test} disabled=${loading}>${loading?'Проверяем...':'Продолжить'}</button>
        <div class="apihint">Ключ: <a href="https://console.anthropic.com/settings/keys" target="_blank" rel="noopener noreferrer">console.anthropic.com</a> · ~$0.003/занятие</div>
      </div>
    </div>`;
}

  useEffect(()=>{lsSet(lsKey(course,'done'),[...done]);},[done,course]);

  const switchCourse=(c)=>{

      });

                      const rating=ls(`rating_${course}_${l.n}`,null);
                      const ratingDot=rating==='good'?'#34C759':rating==='repeat'?'#FF9500':rating==='hard'?'#FF3B30':null;
                      return html`<div key=${l.n}>
                        ${idx>0&&html`<div class="sdiv"/>`}
                        <button class=${`li ${isAct?'act':''}`} onClick=${()=>pick(l)} aria-current=${isAct?'page':undefined}>
                          <div class="lbox" style="background:${isDone?P[ph].bg:isAct?P[ph].bg:'var(--surface3)'}">
                            ${isDone?html`<svg width="11" height="9" viewBox="0 0 11 9" fill="none"><path d="M1 4.5L4 7.5L10 1" stroke=${P[ph].c} stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>`:html`<span style="font-size:10px;font-weight:700;color:${isAct?P[ph].c:'var(--text3)'}">${l.n}</span>`}
                          </div>
                          <span class="lname" style="color:${isAct?P[ph].c:'var(--text1)'}">${l.name}</span>
                          <div style="display:flex;align-items:center;gap:4px;margin-left:auto;flex-shrink:0">
                            ${ratingDot&&html`<div style="width:6px;height:6px;border-radius:50%;background:${ratingDot}"/>`}
                            ${isAct&&html`<div style="width:5px;height:5px;border-radius:50%;background:${P[ph].c}"/>`}
                          </div>
                        </button>
                      </div>`;
                    })}
                  </div>
                </div>`;
            })}

            <!-- Reset -->
            <div style="padding:8px 16px 12px">
              ${confirmReset?html`
                <div class="confirm-strip">
                  <span>Сбросить прогресс курса?</span>
                  <div style="display:flex;gap:6px;flex-shrink:0">
                    <button class="cno" onClick=${()=>setConfirmReset(false)}>Отмена</button>
                    <button class="cyes" onClick=${doReset}>Сбросить</button>
                  </div>
                </div>`:html`<button class="reset-lnk" onClick=${()=>setConfirmReset(true)}>сбросить прогресс</button>`}
            </div>
            <div style="height:20px"/>
          </div>
          <div class="dim" onClick=${()=>setOpen(false)}/>
        </div>`}

      <!-- Notes panel -->
      ${notesOpen&&cur&&html`
        <div class="notes-ov">
          <div class="notes-dim" onClick=${()=>{saveNote();setNotesOpen(false);}}/>
          <div ref=${notesOverlayRef} class="notes-panel">
            <div class="notes-hdr">
              <span class="notes-title">📝 Заметки — занятие ${cur.n}</span>
              <button class="xbtn" onClick=${()=>{saveNote();setNotesOpen(false);}} aria-label="Закрыть заметки">✕</button>
            </div>
            <textarea ref=${notesRef} class="notes-area"
              placeholder="Записывай сюда ключевые команды, решения, выводы..."
              value=${noteText}
              onInput=${e=>{setNoteText(e.target.value);}}
              onBlur=${saveNote}
              aria-label="Заметки к занятию"/>
            <div class="notes-hint">Сохраняются автоматически · Видны только тебе</div>
          </div>
        </div>`}
    <//>`;
}

render(html`<${App}/>`, document.getElementById('root'));
</script>
</body>
</html>
